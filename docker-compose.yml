version: "3.9"

# ── DocMind + Endee Stack ──────────────────────────────────────────────────────
# Start everything:   docker compose up -d
# Stop:               docker compose down
# View logs:          docker compose logs -f

services:

  # ── Endee Vector Database ────────────────────────────────────────────────────
  endee:
    image: endeeio/endee-server:latest
    container_name: endee-server
    ports:
      - "8080:8080"
    ulimits:
      nofile: 100000
    environment:
      NDD_NUM_THREADS: 0            # Auto-detect thread count
      NDD_AUTH_TOKEN: ""            # Set a token here + in .env for auth
    volumes:
      - endee-data:/data            # Persist index data across restarts
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── DocMind Streamlit App ────────────────────────────────────────────────────
  docmind:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: docmind-app
    ports:
      - "8501:8501"
    environment:
      # Override Endee URL to use the service name inside Docker network
      ENDEE_BASE_URL: http://endee:8080/api/v1
      ENDEE_INDEX_NAME: docmind_index
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-3-haiku-20240307}
      EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2
      EMBEDDING_DIMENSION: "384"
      CHUNK_SIZE: "512"
      CHUNK_OVERLAP: "64"
      TOP_K: "5"
    volumes:
      - ./data:/app/data              # Mount local documents into container
      - ./logs:/app/logs
    depends_on:
      endee:
        condition: service_healthy
    restart: unless-stopped

volumes:
  endee-data:
    driver: local
